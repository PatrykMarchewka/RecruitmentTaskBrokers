<link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
>

<div class="container py4">


<h3 class="mb-4">Import Contacts</h3>

<a href="{% url 'contactList' %}" class="btn btn-outline-secondary mt-3 mb-3">
    <- Back to contacts
</a>


<div class="card shadow-sm mb-3">
    <div class="card-body">

        <form method="POST" enctype="multipart/form-data" class="mt-2">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Choose CSV file</label>
                <input
                        type="file"
                        name="file"
                        accept=".csv"
                        class="form-control"
                        id="csvInput"
                >
            </div>

            <button
                    id="importBtn"
                    class="btn btn-secondary mt-2"
                    style="display: none;"
            >
                Import CSV
            </button>
        </form>

    </div>
</div>

<script>
    const input = document.getElementById('csvInput');
    const btn = document.getElementById('importBtn');

    input.addEventListener('change', () => {
        btn.style.display = input.files.length > 0 ? 'inline-block' : 'none';
    });
</script>

<div class="d-flex justify-content-end mb-3">
    <a href="{% url 'contactExport' %}" class="btn btn-outline-primary">
        <i class="bi bi-download"></i> Export Contacts
    </a>
</div>


{% if messages %}
    <div class="mt-3">
        {% for message in messages %}
            {% if forloop.last %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endif %}
        {% endfor %}
    </div>
{% endif %}
</div>
