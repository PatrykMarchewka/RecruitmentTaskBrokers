<link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
>

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Contacts</h2>
        <div class="d-flex gap-2">
            <a href="{% url 'contactCreate' %}" class="btn btn-success">
                Add new contact
            </a>

            <a href="{% url 'contactImport' %}" class="btn btn-secondary">
                Import from CSV
            </a>
        </div>
    </div>

    <!-- Search Bar -->
    <form method="GET" class="mb-4">
        <div class="input-group shadow-sm">
            <input
                    type="text"
                    name="search"
                    value="{{ search }}"
                    placeholder="Search contacts..."
                    class="form-control"
            >
            <button type="submit" class="btn btn-primary px-4">
                Search
            </button>
        </div>
    </form>

    <!-- Contacts Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-hover table-striped mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>Name</th>
                    <th><a href="?sort=lastName" class="text-decoration-none">Last Name</a></th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>Weather</th>
                    <th>Status</th>
                    <th><a href="?sort=createdAt" class="text-decoration-none">Created</a></th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>

                <tbody>
                {% for c in contacts %}
                    <tr>
                        <td>{{ c.name }}</td>
                        <td>{{ c.lastName }}</td>
                        <td>{{ c.email }}</td>
                        <td>{{ c.phone }}</td>
                        <td>{{ c.city.name }}</td>
                        <td>{{ c.city.weather }}</td>
                        <td>{{ c.status.name }}</td>
                        <td>{{ c.createdAt }}</td>

                        <td class="text-end align-middle">
                            <div class="d-flex justify-content-end align-items-center gap-2 w-100">
                                <a href="{% url 'contactEdit' c.ID %}" class="btn btn-sm btn-primary">Edit</a>
                                <a href="{% url 'contactDelete' c.ID %}" class="btn btn-sm btn-danger">Delete</a>
                            </div>
                        </td>


                    </tr>
                {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>
